<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Study Plans · תוכניות לימוד — President Oaks</title>
<meta name="description" content="Themed scripture study plans based on President Oaks' General Conference talks">
<meta name="theme-color" content="#1e2233">
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="icons/icon-192.png">
<link href="https://fonts.googleapis.com/css2?family=David+Libre:wght@400;500;700&family=Frank+Ruhl+Libre:wght@300;400;500;700&family=Crimson+Pro:ital,wght@0,300;0,400;0,600;1,300;1,400&family=Cormorant+Garamond:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
<style>

/* ========== THEME ========== */
:root {
  --bg: #faf8f2;
  --bg-deep: #f0ece0;
  --ink: #1a1a1a;
  --ink-light: #444;
  --accent: #c8a84e;
  --accent-light: #d4b96a;
  --rule: #d6ceb8;
  --rule-light: #e8e2d4;
  --header-bg: #1e2233;
  --header-text: #c8a84e;
  --highlight: rgba(200, 168, 78, 0.10);
  --ref-color: #5dade2;
  --check-color: #4caf50;
}
body.dark-mode {
  --bg: #333333; --bg-deep: #2a2a2a;
  --ink: #e8e0d0; --ink-light: #b0a890;
  --accent: #d4af37; --accent-light: #e8c84e;
  --rule: #444444; --rule-light: #383838;
  --header-bg: #0a0a0a; --header-text: #d4af37;
  --highlight: rgba(200, 168, 78, 0.15);
  --ref-color: #85c1e9;
  --check-color: #66bb6a;
}

* { margin: 0; padding: 0; box-sizing: border-box; }

body {
  font-family: 'Crimson Pro', 'Georgia', serif;
  background: var(--bg);
  color: var(--ink);
  min-height: 100vh;
  transition: background 0.3s, color 0.3s;
}

/* ========== TOP BAR ========== */
.controls-top {
  position: fixed; top: 0; left: 0; right: 0; z-index: 100;
  background: #1e2233; color: #c8a84e;
  display: flex; justify-content: center; align-items: center;
  padding: 6px 12px; gap: 12px; flex-wrap: wrap;
  font-family: 'Crimson Pro', serif; font-size: 0.9em; direction: ltr;
}
body.dark-mode .controls-top { background: #0a0a0a; }

.tools-group { display: flex; align-items: center; gap: 8px; direction: ltr; }
.tools-group button {
  background: transparent; border: 1px solid #3a3f55; color: #c8a84e;
  padding: 5px 10px; border-radius: 3px; cursor: pointer; font-size: 0.9em; transition: all 0.2s;
}
.tools-group button:hover { background: #2a2f44; }

.top-title {
  font-family: 'Cormorant Garamond', serif;
  font-size: 1.05em; font-weight: 600; color: #c8a84e;
}

/* ========== MAIN CONTENT ========== */
.page {
  max-width: 720px;
  margin: 0 auto;
  padding: 60px 24px 40px;
  background: var(--bg);
  min-height: 100vh;
}

/* ========== LANDING VIEW ========== */
.plans-hero { text-align: center; padding: 30px 20px 10px; }
.plans-hero h1 {
  font-family: 'Cormorant Garamond', serif;
  font-size: 2em; font-weight: 600; color: var(--accent);
  letter-spacing: 0.04em; margin-bottom: 4px;
}
.plans-hero .subtitle-he {
  font-family: 'David Libre', serif;
  font-size: 1.3em; color: var(--ink); direction: rtl;
}
.plans-hero .subtitle-desc {
  font-size: 0.95em; color: var(--ink-light);
  max-width: 500px; margin: 12px auto 0; line-height: 1.6;
}
.diamond-divider {
  text-align: center; padding: 18px 0 24px;
  color: var(--accent); font-size: 0.7em; letter-spacing: 12px;
}
.diamond-divider::before { content: "· · \25C6 · ·"; }

/* ========== PLAN CARDS ========== */
.plan-grid {
  display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
  gap: 16px; margin-bottom: 30px;
}
.plan-card {
  background: var(--bg-deep); border: 1px solid var(--rule);
  border-radius: 8px; padding: 20px 16px; cursor: pointer;
  transition: all 0.2s; text-align: center;
}
.plan-card:hover { border-color: var(--accent); transform: translateY(-3px); box-shadow: 0 4px 16px rgba(0,0,0,0.12); }
.plan-card-icon { font-size: 2em; margin-bottom: 8px; }
.plan-card-title {
  font-family: 'Cormorant Garamond', serif;
  font-size: 1.1em; font-weight: 600; color: var(--ink);
  margin-bottom: 4px;
}
.plan-card-title-he {
  font-family: 'David Libre', serif;
  font-size: 0.95em; color: var(--accent); direction: rtl;
  margin-bottom: 6px;
}
.plan-card-count {
  font-size: 0.8em; color: var(--ink-light);
}
.plan-card-progress {
  margin-top: 10px; height: 4px; background: var(--rule-light);
  border-radius: 2px; overflow: hidden;
}
.plan-card-progress-fill {
  height: 100%; background: var(--check-color); border-radius: 2px;
  transition: width 0.3s;
}

/* ========== PLAN DETAIL VIEW ========== */
#plan-view { display: none; }

.plan-header {
  text-align: center; padding: 16px 0; margin-bottom: 20px;
  border-bottom: 2px solid var(--rule);
}
.plan-header h2 {
  font-family: 'Cormorant Garamond', serif;
  font-size: 1.6em; font-weight: 600; color: var(--ink);
  margin-bottom: 2px;
}
.plan-header .plan-header-he {
  font-family: 'David Libre', serif;
  font-size: 1.1em; color: var(--accent); direction: rtl;
}
.plan-header .plan-desc {
  font-size: 0.9em; color: var(--ink-light); margin-top: 6px;
}
.plan-progress-bar {
  margin: 16px 0; height: 6px; background: var(--rule-light);
  border-radius: 3px; overflow: hidden;
}
.plan-progress-fill {
  height: 100%; background: var(--check-color); border-radius: 3px;
  transition: width 0.3s;
}
.plan-progress-text {
  text-align: center; font-size: 0.85em; color: var(--ink-light); margin-bottom: 16px;
}

/* ========== STUDY ITEM ========== */
.study-item {
  display: flex; gap: 12px; padding: 14px 12px;
  border: 1px solid var(--rule-light); border-radius: 8px;
  margin-bottom: 10px; transition: all 0.2s;
  align-items: flex-start;
}
.study-item:hover { border-color: var(--accent); background: var(--highlight); }
.study-item.completed { opacity: 0.6; }
.study-item.completed .si-ref { text-decoration: line-through; }

.si-check {
  width: 24px; height: 24px; min-width: 24px;
  border: 2px solid var(--rule); border-radius: 50%;
  cursor: pointer; display: flex; align-items: center; justify-content: center;
  transition: all 0.2s; margin-top: 2px;
  font-size: 0.75em; color: transparent;
}
.si-check:hover { border-color: var(--check-color); }
.study-item.completed .si-check {
  background: var(--check-color); border-color: var(--check-color); color: #fff;
}

.si-content { flex: 1; }
.si-ref {
  font-weight: 600; color: var(--ref-color); font-size: 1em;
  cursor: pointer; margin-bottom: 4px;
}
.si-ref:hover { text-decoration: underline; }
.si-talk {
  font-size: 0.82em; color: var(--ink-light); margin-bottom: 4px;
}
.si-talk a { color: var(--accent); text-decoration: none; }
.si-talk a:hover { text-decoration: underline; }
.si-note {
  font-size: 0.88em; color: var(--ink); line-height: 1.5;
  font-style: italic;
}
.si-actions {
  display: flex; gap: 6px; margin-top: 6px;
}
.si-action {
  font-size: 0.78em; color: var(--accent); cursor: pointer;
  border: 1px solid var(--rule); padding: 2px 8px; border-radius: 3px;
  background: transparent; font-family: 'Crimson Pro', serif;
  transition: all 0.15s;
}
.si-action:hover { background: var(--accent); color: #fff; border-color: var(--accent); }

/* ========== BACK LINK ========== */
.back-nav {
  text-align: center; margin: 20px 0;
}
.back-nav a {
  font-family: 'Crimson Pro', serif; color: var(--accent);
  text-decoration: none; font-size: 0.95em;
  border: 1px solid var(--rule); padding: 8px 20px; border-radius: 4px;
  transition: all 0.2s; display: inline-block;
}
.back-nav a:hover { background: var(--accent); color: #fff; border-color: var(--accent); }

/* ========== RESPONSIVE ========== */
@media (max-width: 600px) {
  .page { padding: 50px 12px 30px; }
  .plans-hero h1 { font-size: 1.5em; }
  .plan-grid { grid-template-columns: 1fr 1fr; }
  .study-item { padding: 10px 8px; }
}
</style>
</head>
<body>

<!-- Top controls bar -->
<div class="controls-top" role="navigation">
  <div class="tools-group">
    <button onclick="window.location.href='index.html'" title="Home">&#x1F3E0;</button>
  </div>
  <span class="top-title" id="top-title">Study Plans · תוכניות לימוד</span>
  <div class="tools-group">
    <button onclick="window.location.href='talks.html'" title="Browse talks">&#x1F399;</button>
    <button id="dark-mode-toggle" onclick="toggleDark()" title="Dark mode">&#x1F319;</button>
  </div>
</div>

<!-- Main content -->
<div class="page">

  <!-- Plans Landing -->
  <div id="plans-landing">
    <div class="plans-hero">
      <h1>Study Plans</h1>
      <div class="subtitle-he">תוכניות לימוד</div>
      <div class="subtitle-desc">
        Themed scripture reading plans drawn from President Oaks' General Conference talks.
        Track your progress as you study each passage in Hebrew.
      </div>
    </div>

    <div class="diamond-divider"></div>

    <div id="plan-grid" class="plan-grid"></div>

    <div class="back-nav">
      <a href="index.html">&larr; Back to Standard Works</a>
    </div>
  </div>

  <!-- Plan Detail View -->
  <div id="plan-view">
    <div id="plan-detail"></div>
    <div class="back-nav" style="margin-top:24px;">
      <a href="#" onclick="showPlansLanding(); return false;">&larr; Back to All Plans</a>
    </div>
  </div>

</div>

<!-- Data scripts -->
<script src="talks_data/oaks_study_plans.js"></script>
<script src="talks_data/oaks_talks.js"></script>
<script src="bom/scripture_verses.js"></script>

<script>
(function() {
  'use strict';

  var plans = window._oaksStudyPlans || [];
  var talks = window._oaksTalksData || [];
  var STORAGE_KEY = 'oaks-study-progress';

  // Plan topic icons
  var planIcons = {
    'faith-and-testimony': '\uD83D\uDD25',
    'repentance-and-forgiveness': '\uD83D\uDE4F',
    'covenants-and-ordinances': '\uD83D\uDCDC',
    'family-and-marriage': '\uD83C\uDFE0',
    'charity-and-service': '\u2764\uFE0F',
    'holy-ghost-and-revelation': '\uD83D\uDD4A\uFE0F',
    'jesus-christ-and-atonement': '\u2728',
    'obedience-and-commandments': '\uD83D\uDCCB'
  };

  // Scripture ref → volume page mapping
  var bookToPage = {
    'Genesis': 'ot.html', 'Exodus': 'ot.html', 'Leviticus': 'ot.html', 'Numbers': 'ot.html',
    'Deuteronomy': 'ot.html', 'Joshua': 'ot.html', 'Judges': 'ot.html', 'Ruth': 'ot.html',
    '1 Samuel': 'ot.html', '2 Samuel': 'ot.html', '1 Kings': 'ot.html', '2 Kings': 'ot.html',
    '1 Chronicles': 'ot.html', '2 Chronicles': 'ot.html', 'Ezra': 'ot.html', 'Nehemiah': 'ot.html',
    'Esther': 'ot.html', 'Job': 'ot.html', 'Psalms': 'ot.html', 'Proverbs': 'ot.html',
    'Ecclesiastes': 'ot.html', 'Song of Solomon': 'ot.html', 'Isaiah': 'ot.html', 'Jeremiah': 'ot.html',
    'Lamentations': 'ot.html', 'Ezekiel': 'ot.html', 'Daniel': 'ot.html', 'Hosea': 'ot.html',
    'Joel': 'ot.html', 'Amos': 'ot.html', 'Obadiah': 'ot.html', 'Jonah': 'ot.html',
    'Micah': 'ot.html', 'Nahum': 'ot.html', 'Habakkuk': 'ot.html', 'Zephaniah': 'ot.html',
    'Haggai': 'ot.html', 'Zechariah': 'ot.html', 'Malachi': 'ot.html',
    'Matthew': 'nt.html', 'Mark': 'nt.html', 'Luke': 'nt.html', 'John': 'nt.html',
    'Acts': 'nt.html', 'Romans': 'nt.html', '1 Corinthians': 'nt.html', '2 Corinthians': 'nt.html',
    'Galatians': 'nt.html', 'Ephesians': 'nt.html', 'Philippians': 'nt.html', 'Colossians': 'nt.html',
    '1 Thessalonians': 'nt.html', '2 Thessalonians': 'nt.html',
    '1 Timothy': 'nt.html', '2 Timothy': 'nt.html', 'Titus': 'nt.html', 'Philemon': 'nt.html',
    'Hebrews': 'nt.html', 'James': 'nt.html', '1 Peter': 'nt.html', '2 Peter': 'nt.html',
    '1 John': 'nt.html', '2 John': 'nt.html', '3 John': 'nt.html', 'Jude': 'nt.html', 'Revelation': 'nt.html',
    'D&C': 'dc.html',
    'Moses': 'pgp.html', 'Abraham': 'pgp.html', 'JS-H': 'pgp.html', 'JS-M': 'pgp.html', 'A-of-F': 'pgp.html',
    '1 Nephi': 'bom/bom.html', '2 Nephi': 'bom/bom.html', 'Jacob': 'bom/bom.html', 'Enos': 'bom/bom.html',
    'Jarom': 'bom/bom.html', 'Omni': 'bom/bom.html', 'Words of Mormon': 'bom/bom.html',
    'Mosiah': 'bom/bom.html', 'Alma': 'bom/bom.html', 'Helaman': 'bom/bom.html',
    '3 Nephi': 'bom/bom.html', '4 Nephi': 'bom/bom.html', 'Mormon': 'bom/bom.html',
    'Ether': 'bom/bom.html', 'Moroni': 'bom/bom.html'
  };

  // ── Progress persistence ──
  function loadProgress() {
    try { return JSON.parse(localStorage.getItem(STORAGE_KEY)) || {}; }
    catch(e) { return {}; }
  }
  function saveProgress(data) {
    try { localStorage.setItem(STORAGE_KEY, JSON.stringify(data)); } catch(e) {}
  }
  function getCompleted(planId) {
    var prog = loadProgress();
    return prog[planId] || [];
  }
  function toggleCompleted(planId, refKey) {
    var prog = loadProgress();
    if (!prog[planId]) prog[planId] = [];
    var idx = prog[planId].indexOf(refKey);
    if (idx === -1) prog[planId].push(refKey);
    else prog[planId].splice(idx, 1);
    saveProgress(prog);
  }

  // ── Format reference ──
  function formatRef(key) {
    var parts = key.split('|');
    if (parts.length < 3) return key;
    if (parts[2] === '0') return parts[0] + ' ' + parts[1];
    return parts[0] + ' ' + parts[1] + ':' + parts[2];
  }

  function escHtml(s) {
    return String(s).replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
  }

  // ── Build plan cards ──
  function buildPlansLanding() {
    if (!plans || plans.length === 0) {
      document.getElementById('plan-grid').innerHTML = '<p style="text-align:center;color:var(--ink-light);">No study plans found. Run <code>node fetch_oaks_talks.js</code> to generate data.</p>';
      return;
    }

    var html = '';
    plans.forEach(function(plan) {
      var completed = getCompleted(plan.id);
      var pct = plan.items.length > 0 ? Math.round((completed.length / plan.items.length) * 100) : 0;
      var icon = planIcons[plan.id] || '\uD83D\uDCD6';

      html += '<div class="plan-card" onclick="showPlan(\'' + plan.id + '\')">';
      html += '<div class="plan-card-icon">' + icon + '</div>';
      html += '<div class="plan-card-title">' + escHtml(plan.title) + '</div>';
      html += '<div class="plan-card-title-he">' + plan.titleHe + '</div>';
      html += '<div class="plan-card-count">' + plan.items.length + ' scriptures</div>';
      html += '<div class="plan-card-progress"><div class="plan-card-progress-fill" style="width:' + pct + '%"></div></div>';
      html += '</div>';
    });
    document.getElementById('plan-grid').innerHTML = html;
  }

  // ── Show plan detail ──
  window.showPlan = function(planId) {
    var plan = plans.find(function(p) { return p.id === planId; });
    if (!plan) return;

    var completed = getCompleted(planId);
    var pct = plan.items.length > 0 ? Math.round((completed.length / plan.items.length) * 100) : 0;

    var html = '<div class="plan-header">';
    html += '<h2>' + escHtml(plan.title) + '</h2>';
    html += '<div class="plan-header-he">' + plan.titleHe + '</div>';
    html += '<div class="plan-desc">' + escHtml(plan.description) + '</div>';
    html += '</div>';

    html += '<div class="plan-progress-bar"><div class="plan-progress-fill" id="progress-fill" style="width:' + pct + '%"></div></div>';
    html += '<div class="plan-progress-text" id="progress-text">' + completed.length + ' of ' + plan.items.length + ' completed (' + pct + '%)</div>';

    plan.items.forEach(function(item, idx) {
      var isCompleted = completed.includes(item.ref);
      var refDisplay = formatRef(item.ref);
      var book = item.ref.split('|')[0];
      var page = bookToPage[book];

      html += '<div class="study-item' + (isCompleted ? ' completed' : '') + '" id="item-' + idx + '">';

      // Checkbox
      html += '<div class="si-check" onclick="toggleItem(\'' + planId + '\', \'' + item.ref + '\', ' + idx + ')">';
      html += isCompleted ? '\u2713' : '';
      html += '</div>';

      html += '<div class="si-content">';
      html += '<div class="si-ref">' + refDisplay + '</div>';

      // Talk source
      html += '<div class="si-talk">From: <a href="talks.html#' + item.talkId + '">' + escHtml(item.talkTitle) + '</a> (' + item.date.substring(0, 4) + ')</div>';

      // Context note
      if (item.note) {
        html += '<div class="si-note">' + escHtml(item.note) + '</div>';
      }

      // Actions
      html += '<div class="si-actions">';
      if (page) {
        html += '<a class="si-action" href="' + page + '" target="_blank">Read in Hebrew \u2192</a>';
      }
      html += '<a class="si-action" href="talks.html#' + item.talkId + '" target="_blank">Read Talk \u2192</a>';
      html += '</div>';

      html += '</div>'; // si-content
      html += '</div>'; // study-item
    });

    document.getElementById('plan-detail').innerHTML = html;
    document.getElementById('plans-landing').style.display = 'none';
    document.getElementById('plan-view').style.display = 'block';
    document.getElementById('top-title').textContent = plan.title;
    window.location.hash = planId;
    window.scrollTo(0, 0);
  };

  // ── Toggle item completion ──
  window.toggleItem = function(planId, refKey, idx) {
    toggleCompleted(planId, refKey);
    var plan = plans.find(function(p) { return p.id === planId; });
    var completed = getCompleted(planId);
    var isCompleted = completed.includes(refKey);

    // Update UI
    var itemEl = document.getElementById('item-' + idx);
    var checkEl = itemEl.querySelector('.si-check');
    if (isCompleted) {
      itemEl.classList.add('completed');
      checkEl.textContent = '\u2713';
    } else {
      itemEl.classList.remove('completed');
      checkEl.textContent = '';
    }

    // Update progress bar
    var pct = plan.items.length > 0 ? Math.round((completed.length / plan.items.length) * 100) : 0;
    document.getElementById('progress-fill').style.width = pct + '%';
    document.getElementById('progress-text').textContent = completed.length + ' of ' + plan.items.length + ' completed (' + pct + '%)';
  };

  // ── Show landing ──
  window.showPlansLanding = function() {
    document.getElementById('plans-landing').style.display = 'block';
    document.getElementById('plan-view').style.display = 'none';
    document.getElementById('top-title').textContent = 'Study Plans \u00B7 \u05EA\u05D5\u05DB\u05E0\u05D9\u05D5\u05EA \u05DC\u05D9\u05DE\u05D5\u05D3';
    window.location.hash = '';
    buildPlansLanding(); // Refresh progress bars
    window.scrollTo(0, 0);
  };

  // ── Hash routing ──
  function handleHash() {
    var hash = window.location.hash.replace('#', '');
    if (hash && plans.some(function(p) { return p.id === hash; })) {
      showPlan(hash);
    } else {
      showPlansLanding();
    }
  }
  window.addEventListener('hashchange', handleHash);

  // ── Dark mode ──
  window.toggleDark = function() {
    document.body.classList.toggle('dark-mode');
    var isDark = document.body.classList.contains('dark-mode');
    document.getElementById('dark-mode-toggle').textContent = isDark ? '\u2600\uFE0F' : '\uD83C\uDF19';
    try { localStorage.setItem('sw-dark', isDark ? '1' : '0'); } catch(e) {}
  };
  (function() {
    try {
      if (localStorage.getItem('sw-dark') === '1') {
        document.body.classList.add('dark-mode');
        document.getElementById('dark-mode-toggle').textContent = '\u2600\uFE0F';
      }
    } catch(e) {}
  })();

  // ── Init ──
  buildPlansLanding();
  handleHash();

})();
</script>

<script>
if ('serviceWorker' in navigator) {
  navigator.serviceWorker.register('service-worker.js');
}
</script>
</body>
</html>
