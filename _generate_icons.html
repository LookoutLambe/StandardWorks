<!DOCTYPE html>
<html>
<head><title>Generate PWA Icons</title></head>
<body>
<h2>Right-click each image and "Save image as..." into the icons/ folder</h2>

<h3>icon-192.png</h3>
<canvas id="c192" width="192" height="192"></canvas>

<h3>icon-512.png</h3>
<canvas id="c512" width="512" height="512"></canvas>

<script>
function drawIcon(canvas) {
  const s = canvas.width;
  const ctx = canvas.getContext('2d');

  // Background
  ctx.fillStyle = '#1e2233';
  ctx.fillRect(0, 0, s, s);

  // Gold border
  const b = s * 0.04;
  ctx.strokeStyle = '#c8a84e';
  ctx.lineWidth = b;
  ctx.strokeRect(b/2, b/2, s - b, s - b);

  // Inner rule lines
  ctx.strokeStyle = 'rgba(200, 168, 78, 0.4)';
  ctx.lineWidth = s * 0.01;
  const m = s * 0.12;
  ctx.strokeRect(m, m, s - 2*m, s - 2*m);

  // Hebrew text — כתבי הקודש
  ctx.fillStyle = '#c8a84e';
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';
  ctx.font = `bold ${s * 0.18}px "David Libre", "Times New Roman", serif`;
  ctx.fillText('כתבי', s/2, s * 0.35);
  ctx.fillText('הקודש', s/2, s * 0.52);

  // English subtitle
  ctx.font = `${s * 0.065}px "Cormorant Garamond", Georgia, serif`;
  ctx.fillStyle = 'rgba(200, 168, 78, 0.7)';
  ctx.fillText('STANDARD WORKS', s/2, s * 0.72);

  // Small decorative rule
  ctx.strokeStyle = '#c8a84e';
  ctx.lineWidth = s * 0.008;
  ctx.beginPath();
  ctx.moveTo(s * 0.3, s * 0.80);
  ctx.lineTo(s * 0.7, s * 0.80);
  ctx.stroke();
}

drawIcon(document.getElementById('c192'));
drawIcon(document.getElementById('c512'));

// Auto-download both
['c192','c512'].forEach(id => {
  const canvas = document.getElementById(id);
  const link = document.createElement('a');
  link.download = id === 'c192' ? 'icon-192.png' : 'icon-512.png';
  link.href = canvas.toDataURL('image/png');
  link.click();
});
</script>
</body>
</html>
